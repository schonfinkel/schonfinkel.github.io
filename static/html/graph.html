"", "target": "\"808559c1-3472-46c7-8f5c-aac840e6f038\""}, {"source": "\"1949c98e-e1c0-474b-b383-c76aa418d583\"", "target": "\"11f7d9cc-51a6-4897-955b-37a756105677\""}, {"source": "\"60f014f9-8a82-43b8-ae13-dee68b9470bf\"", "target": "\"1949c98e-e1c0-474b-b383-c76aa418d583\""}, {"source": "\"36f5efb2-34da-4d67-8c37-bbd5429d7b55\"", "target": "\"11f7d9cc-51a6-4897-955b-37a756105677\""}, {"source": "\"36f5efb2-34da-4d67-8c37-bbd5429d7b55\"", "target": "\"1949c98e-e1c0-474b-b383-c76aa418d583\""}, {"source": "\"e670c5d9-8238-4bf4-a916-e9ffb3097fa1\"", "target": "\"ee377537-0c8d-48c9-a181-19a2cff8c4a7\""}, {"source": "\"e670c5d9-8238-4bf4-a916-e9ffb3097fa1\"", "target": "\"dd924a84-7d6f-41ec-98c2-aa16582c0d89\""}, {"source": "\"2e7e6a31-ebb1-4f20-bacb-06595a0d1c99\"", "target": "\"b5f53d7f-5d88-4481-b9e2-d9d271714bd8\""}, {"source": "\"f5f06bf3-d288-47a8-901f-37bec1ba50e7\"", "target": "\"3bdcfa3b-8fb6-4c4f-97d9-9abaf4aa4a8b\""}, {"source": "\"148ec972-5f02-45fb-bfea-b3d622d9144e\"", "target": "\"6ed3a191-0128-453e-b0b6-37c48593a6f0\""}, {"source": "\"4fda2550-a57f-46ae-9671-570aac6abcf6\"", "target": "\"b5f53d7f-5d88-4481-b9e2-d9d271714bd8\""}, {"source": "\"4fda2550-a57f-46ae-9671-570aac6abcf6\"", "target": "\"2e7e6a31-ebb1-4f20-bacb-06595a0d1c99\""}, {"source": "\"04a44951-985d-4b5b-bd52-f1893ea29ae7\"", "target": "\"6ed3a191-0128-453e-b0b6-37c48593a6f0\""}, {"source": "\"04a44951-985d-4b5b-bd52-f1893ea29ae7\"", "target": "\"2daf1307-afb4-49e4-98cb-66ac7eb27cf0\""}, {"source": "\"04a44951-985d-4b5b-bd52-f1893ea29ae7\"", "target": "\"6c01e436-53fc-47f1-878f-f996fc3eeb38\""}, {"source": "\"6c01e436-53fc-47f1-878f-f996fc3eeb38\"", "target": "\"de7d0e94-618f-4982-b3e5-8806d88cad5d\""}, {"source": "\"6c01e436-53fc-47f1-878f-f996fc3eeb38\"", "target": "\"6ed3a191-0128-453e-b0b6-37c48593a6f0\""}, {"source": "\"6c01e436-53fc-47f1-878f-f996fc3eeb38\"", "target": "\"d47afd83-8f59-44ea-a237-b6eafaa3662e\""}, {"source": "\"75faf079-a061-4f10-871b-4191e3a43bbd\"", "target": "\"de7d0e94-618f-4982-b3e5-8806d88cad5d\""}]}
var url = "https://schonfinkel.github.io/"

const GRAPH_CONFIG = {
    node: {
        baseRadius: 8,      // Reduced from 11
        radiusFactor: 16,   // Reduced from 24
        hoverScale: 2.0,    // Increased scale so they pop when hovered
        defaultColor: "#ffffff",
        strokeColor: "rgba(0,0,0,0.4)",
        strokeWidth: 1.0
    },
    links: {
        stroke: "#bbb",
        opacity: 0.4,
        defaultWidth: 0.8,
        highlightWidth: 4
    },
    force: {
        charge: -180,       // Slightly weaker push for smaller nodes
        linkStrength: 0.07,
        collisionStrength: 2.0, // Stronger collision to keep small nodes apart
        xyStrength: 0.15,
        velocityDecay: 0.5
    }
};

function fix_link(str) { 
    return url.concat("/notes/", str, ".html"); 
}

function draw_graph(data, height, width) {
    const svg = d3.select("svg#note-graph")
        .attr('max-width', '60%')
        .attr("viewBox", [0, 0, width, height]);

    const links = data.links.map(d => Object.create(d));
    const nodes = data.nodes.map(d => Object.create(d));

    const num_clusters = Math.max(...nodes.map(d => d.communityLabel || 0)) + 1;
    const centers = Array.from({ length: num_clusters }, (_, i) => {
        const angle = 2 * Math.PI * i / num_clusters;
        return {
            x: Math.cos(Math.PI + angle),
            y: Math.sin(Math.PI + angle)
        };
    });

    const getRadius = d => d.radius || (d.radius = GRAPH_CONFIG.node.baseRadius + 
                        GRAPH_CONFIG.node.radiusFactor * Math.pow(d.centrality || 0, 0.8));
    
    // USES THE DETERMINISTIC COLOR FROM PYTHON
    const getColor = d => d.color || GRAPH_CONFIG.node.defaultColor;

    const simulation = d3.forceSimulation(nodes)
        .alpha(0.9)
        .velocityDecay(GRAPH_CONFIG.force.velocityDecay)
        .force("link", d3.forceLink(links).id(d => d.id).strength(GRAPH_CONFIG.force.linkStrength))
        .force("charge", d3.forceManyBody().strength(GRAPH_CONFIG.force.charge))
        .force('collision', d3.forceCollide().radius(d => getRadius(d) * 1.2).strength(GRAPH_CONFIG.force.collisionStrength))
        .force('x', d3.forceX().x(d => width / 2 + (width / 4) * centers[d.communityLabel].x).strength(GRAPH_CONFIG.force.xyStrength))
        .force('y', d3.forceY().y(d => height / 2 + (height / 8) * centers[d.communityLabel].y).strength(GRAPH_CONFIG.force.xyStrength));

    const linkGroup = svg.append("g")
        .attr("stroke", GRAPH_CONFIG.links.stroke)
        .attr("stroke-opacity", GRAPH_CONFIG.links.opacity)
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("stroke-dasharray", d => d.predicted ? "5,5" : "0,0")
        .attr("stroke-width", GRAPH_CONFIG.links.defaultWidth);

    const nodeGroup = svg.append("g")
        .selectAll("a")
        .data(nodes)
        .join("a")
        .attr("xlink:href", d => fix_link(d.lnk))
        .attr("id", d => "circle_" + d.lnk)
        .append("circle")
        .attr("id", d => d.id.toLowerCase())
        .attr("r", getRadius)
        .attr("fill", getColor)
        .attr("stroke", GRAPH_CONFIG.node.strokeColor)
        .attr("stroke-width", GRAPH_CONFIG.node.strokeWidth)
        .call(d3.drag()
            .on("start", (e, d) => {
                if (!e.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x; d.fy = d.y;
            })
            .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on("end", (e, d) => {
                if (!e.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
            }));

    // Labels
    const labelGroup = svg.append("g").selectAll("g").data(nodes).join("g")
        .style("display", "none")
        .style("pointer-events", "none");

    const labelBg = labelGroup.append("text")
        .attr("class", "node_label_bg")
        .attr("filter", "url(#solid)")
        .attr("dy", -25)
        .style("font-size", "25px")
        .style("alignment-baseline", "middle")
        .text(d => `  ${d.label.replace(/"/g, '')}  `);

    const labelText = labelGroup.append("text")
        .attr("class", "node_label_text")
        .attr("dy", -25)
        .style("fill", "#222")
        .style("font-size", "25px")
        .style("alignment-baseline", "middle")
        .text(d => `  ${d.label.replace(/"/g, '')}  `);

    nodeGroup.on("mouseover", function(event, d) {
        const circle = d3.select(this);
        circle.attr("fill", "#999").attr("r", getRadius(d) * GRAPH_CONFIG.node.hoverScale);

        // Show specific label group
        labelGroup.filter(l => l === d).style("display", "block");

        // Highlight connected links
        linkGroup.attr("stroke-width", l => (l.source === d || l.target === d) ? 
            GRAPH_CONFIG.links.highlightWidth : GRAPH_CONFIG.links.defaultWidth);
    })
    .on("mouseout", function(event, d) {
        const circle = d3.select(this);
        circle.attr("fill", getColor(d)).attr("r", getRadius(d));

        labelGroup.style("display", "none");
        linkGroup.attr("stroke-width", GRAPH_CONFIG.links.defaultWidth);
    });

    simulation.on("tick", () => {
        linkGroup
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        nodeGroup
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);

        labelGroup.attr("transform", d => `translate(${d.x},${d.y})`);
    });
}

// Initialization
const height = window.innerHeight;
const width = window.innerWidth;
draw_graph(graph_data, height, width);
</script>
